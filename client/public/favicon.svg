<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 24" shape-rendering="crispEdges">
  <!-- Pixel elf head: 7x6 grid at 4px per pixel -->
  <!-- Row 0: ears -->
  <rect x="0" y="0" width="4" height="4" fill="#d4a843"/>
  <rect x="24" y="0" width="4" height="4" fill="#d4a843"/>
  <!-- Row 1: ear + face + ear -->
  <rect x="0" y="4" width="4" height="4" fill="#d4a843"/>
  <rect x="4" y="4" width="4" height="4" fill="#3d6a9e"/>
  <rect x="8" y="4" width="4" height="4" fill="#3d6a9e"/>
  <rect x="12" y="4" width="4" height="4" fill="#3d6a9e"/>
  <rect x="16" y="4" width="4" height="4" fill="#3d6a9e"/>
  <rect x="20" y="4" width="4" height="4" fill="#3d6a9e"/>
  <rect x="24" y="4" width="4" height="4" fill="#d4a843"/>
  <!-- Row 2: face -->
  <rect x="4" y="8" width="4" height="4" fill="#3d6a9e"/>
  <rect x="8" y="8" width="4" height="4" fill="#3d6a9e"/>
  <rect x="12" y="8" width="4" height="4" fill="#3d6a9e"/>
  <rect x="16" y="8" width="4" height="4" fill="#3d6a9e"/>
  <rect x="20" y="8" width="4" height="4" fill="#3d6a9e"/>
  <!-- Row 3: eyes -->
  <rect x="4" y="12" width="4" height="4" fill="#3d6a9e"/>
  <rect x="8" y="12" width="4" height="4" fill="#0c0c0c"/>
  <rect x="12" y="12" width="4" height="4" fill="#3d6a9e"/>
  <rect x="16" y="12" width="4" height="4" fill="#0c0c0c"/>
  <rect x="20" y="12" width="4" height="4" fill="#3d6a9e"/>
  <!-- Row 4: face -->
  <rect x="4" y="16" width="4" height="4" fill="#3d6a9e"/>
  <rect x="8" y="16" width="4" height="4" fill="#3d6a9e"/>
  <rect x="12" y="16" width="4" height="4" fill="#3d6a9e"/>
  <rect x="16" y="16" width="4" height="4" fill="#3d6a9e"/>
  <rect x="20" y="16" width="4" height="4" fill="#3d6a9e"/>
  <!-- Row 5: chin -->
  <rect x="4" y="20" width="4" height="4" fill="#3d6a9e"/>
  <rect x="8" y="20" width="4" height="4" fill="#3d6a9e"/>
  <rect x="12" y="20" width="4" height="4" fill="#3d6a9e"/>
  <rect x="16" y="20" width="4" height="4" fill="#3d6a9e"/>
  <rect x="20" y="20" width="4" height="4" fill="#3d6a9e"/>
</svg>
